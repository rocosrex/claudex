<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net 'unsafe-inline';
                 style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
                 font-src 'self' data:;
                 img-src 'self' data:;">
  <title>Claudex</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>

  <!-- marked.js (Markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <!-- PDF.js -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/legacy/build/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/legacy/build/pdf.worker.min.js';
    }
  </script>

  <!-- Ensure xterm globals are available -->
  <script>
    // xterm.js UMD may not expose to window in some contexts; ensure globals
    if (typeof Terminal === 'undefined' && typeof exports === 'object') {
      window.Terminal = exports.Terminal;
    }
    if (typeof FitAddon === 'undefined' && typeof exports === 'object' && exports.FitAddon) {
      window.FitAddon = exports;
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../src/renderer/styles/main.css">
</head>
<body class="bg-slate-900 text-slate-100 overflow-hidden">
  <div id="app"></div>
  <script type="module" src="../src/renderer/app.js"></script>
</body>
</html>
